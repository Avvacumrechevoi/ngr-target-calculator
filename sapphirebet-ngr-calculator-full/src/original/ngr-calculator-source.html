            {showImp&&rNow-rImp>0&&<div style={{fontSize:10,color:"#22c55e",marginBottom:3}}>↓{nm(rNow-rImp)} после улучшений</div>}
            <NgrBar current={g.ngr} target={t}/>
            <div style={{display:"flex",justifyContent:"space-between",marginTop:5,fontSize:10,gap:4,flexWrap:"wrap"}}>
              <span style={{color:"#4b5563"}}>ARPPU <span style={{fontFamily:F,fontWeight:600,color:g.arppu>=50?"#22c55e":g.arppu>=20?"#eab308":"#ef4444"}}>{$(g.arppu)}</span></span>
              <span style={{color:"#4b5563"}}>CO <span style={{fontFamily:F,fontWeight:600,color:g.cashout>.85?"#ef4444":g.cashout>.75?"#eab308":"#22c55e"}}>{pf(g.cashout)}</span></span>
              <span style={{color:"#4b5563"}}>AU <span style={{fontFamily:F,color:"#d1d5db"}}>{nm(g.au)}</span></span>
            </div>
            <div style={{marginTop:4,fontSize:10,color:"#4b5563"}}>
              M1 <span style={{fontFamily:F,color:"#eab308"}}>{p1(P.m1)}</span> · M2M <span style={{fontFamily:F,color:"#eab308"}}>{p1(P.m2m)}</span> · ×<span style={{fontFamily:F,color:"#d1d5db"}}>{MULT.toFixed(2)}</span>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:6,marginTop:5}}>
              <span style={{fontSize:9,color:"#4b5563"}}>Цель:</span>
              <TargetChips value={t} onChange={v=>setGeoTarget(code,v)}/>
            </div>
          </div>);
        })}
      </div>
    );
  }

  // ━━ GEO DETAIL ━━
  const g=geos[view]; if(!g){setView("all");return null;}
  const target=getTarget(view),m=MARCH[view],cr=curRegs(g);
  const pay=PAY_INFO[view]||{approve:P.approve,provider:"—",issue:"Нет данных"};
  const geoApprove=pay.approve;
  const rNow=calcRegs(g.arppu,target,MULT,P.r2f),gxNow=rNow/Math.max(1,cr);
  const arppuNeed=target/(cr*P.r2f*MULT);
  const pathC=calcRegs(g.arppu,target,multI,P.r2f),pathD=calcRegs(g.arppu,target,MULT,r2fI);
  const pathE=calcRegs(g.arppu,target,multI,r2fI),pathF=calcRegs(g.arppu*1.5,target,multI,r2fI);
  const ftdNeed=g.arppu>0?Math.ceil(target/g.arppu/MULT):0;
  const active=g.arppu>0?Math.round(target/g.arppu):0;

  // Funnel for TARGET — using platform R2F (only reliable end-to-end metric)
  const fRegs=rNow;
  const fFTD=ftdNeed;
  const fLostR2F=fRegs-fFTD; // total lost reg→FTD
  const fM1=Math.round(fFTD*P.m1);
  const fLostM1=fFTD-fM1;
  const fSteady=active;

  // Current
  const cFTD=g.ftd,cM1=Math.round(cFTD*P.m1),cSteady=Math.round(cFTD*MULT);

  // Model check
  const modelNGR=Math.round(cSteady*g.arppu);
  const modelDiff=g.ngr-modelNGR;

  return(
    <div style={{minHeight:"100vh",background:"#08090d",color:"#c8ccd4",fontFamily:Sans,padding:"12px 8px"}}>
      <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
        <button onClick={()=>setView("all")} style={{background:"#12131a",border:"1px solid #1e2028",borderRadius:7,padding:"5px 11px",color:"#6b7280",fontSize:13,cursor:"pointer"}}>←</button>
        <div style={{flex:1}}><div style={{fontSize:17,fontWeight:700,color:"#f3f4f6"}}>{g.flag} {g.name}</div><div style={{fontSize:10,color:"#6b7280"}}>{pd.label}</div></div>
      </div>
      <div style={{display:"flex",gap:0,marginBottom:8,borderRadius:7,overflow:"hidden",border:"1px solid #1e2028"}}>
        {Object.entries(PERIODS).map(([k,v])=>(<button key={k} onClick={()=>setPeriod(k)} style={{flex:1,padding:"5px",background:period===k?"#e5a00d12":"#0f1015",border:"none",borderRight:k==="mar"?"1px solid #1e2028":"none",cursor:"pointer",fontSize:11,fontWeight:600,color:period===k?"#e5a00d":"#4b5563"}}>{v.label}</button>))}
      </div>
      <div style={{...cd,padding:10,display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
        <span style={{fontSize:11,color:"#6b7280"}}>Цель {g.name}:</span>
        {TARGETS.map(v=>(<button key={v} onClick={()=>setGeoTarget(view,v)} style={{background:target===v?"#e5a00d":"#12131a",border:`1px solid ${target===v?"#e5a00d":"#1e2028"}`,borderRadius:6,padding:"4px 10px",cursor:"pointer",fontFamily:F,color:target===v?"#08090d":"#6b7280",fontSize:11,fontWeight:700}}>{$(v)}</button>))}
      </div>
      <div style={cd}><NgrBar current={g.ngr} target={target}/></div>

      {/* Hero */}
      <div style={{background:"linear-gradient(135deg,#16130a,#0f1015)",border:"1px solid #e5a00d25",borderRadius:12,padding:16,marginBottom:10}}>
        <div style={{fontSize:10,color:"#6b7280",textTransform:"uppercase",letterSpacing:1,marginBottom:6,textAlign:"center"}}>Регистрации / мес</div>
        <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:10}}>
          <div style={{textAlign:"center"}}><div style={{fontSize:9,color:"#4b5563"}}>сейчас</div><div style={{fontFamily:F,fontSize:20,fontWeight:600,color:"#6b7280"}}>{nm(cr)}</div></div>
          <span style={{fontSize:18,color:"#2a2d35"}}>→</span>
          <div style={{textAlign:"center"}}><div style={{fontSize:9,color:"#e5a00d"}}>нужно</div><div style={{fontFamily:F,fontSize:30,fontWeight:700,color:"#e5a00d"}}>{nm(rNow)}</div></div>
          <div style={{textAlign:"center",marginLeft:6}}><div style={{fontSize:9,color:"#4b5563"}}>добрать</div><div style={{fontFamily:F,fontSize:16,fontWeight:600,color:gxNow<=3?"#22c55e":gxNow<=8?"#eab308":"#ef4444"}}>+{nm(Math.max(0,rNow-cr))}</div></div>
        </div>
      </div>

      {/* Metrics */}
      <div style={{...cd,display:"flex",flexWrap:"wrap",gap:8}}>
        {[["AU",nm(g.au)],["FTD",nm(g.ftd)],["Dep",$(g.dep)],["WD",$(g.wd)],
          ["NGR",$(g.ngr),g.ngr>0?"#22c55e":"#ef4444"],["CO",pf(g.cashout),g.cashout>.85?"#ef4444":"#d1d5db"],
          ["ARPPU",$(g.arppu),g.arppu>=50?"#22c55e":g.arppu>=20?"#eab308":"#ef4444"],
          ...(m?[["LTV",$(m.ltv)],["PB",`${m.payback}%`]]:[])]
          .map(([l,v,c])=>(<div key={l} style={{minWidth:60}}><div style={{fontSize:8,color:"#4b5563",textTransform:"uppercase"}}>{l}</div><div style={{fontFamily:F,fontSize:13,fontWeight:600,color:c||"#d1d5db"}}>{v}</div></div>))}
      </div>

      {/* ═══ FUNNEL ═══ */}
      <div style={{...cd,paddingBottom:16}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
          <div style={{fontSize:13,fontWeight:600,color:"#f3f4f6"}}>Воронка до {$(target)} NGR</div>
          <div style={{fontSize:8,color:"#4b5563",background:"#1a1d24",padding:"2px 5px",borderRadius:3}}>серым = факт</div>
        </div>
        <div style={{fontSize:9,color:"#4b5563",marginBottom:8,padding:"4px 6px",background:"#1a1d2440",borderRadius:4}}>
          Модельная воронка: показывает сколько нужно на каждом этапе при текущих конверсиях (Reg→FTD {p1(P.r2f)}, M1 {p1(P.m1)}, M2M {p1(P.m2m)}). Конверсии — среднее по платформе.
        </div>

        {/* 1. Registrations */}
        <FunnelStep icon="📥" needed={fRegs} current={cr} label="Регистрации / мес" color="#e5a00d" pctOfTop={1}/>

        {/* Drop: Reg → FTD (combined, not split into attempt/decline) */}
        <DropOff lost={fLostR2F} pctLost={1-P.r2f} sev="r"
          title={`${pf(1-P.r2f)} теряются между регистрацией и первым депозитом`}
          detail={`Reg→FTD конверсия всего ${p1(P.r2f)} (платформа: ${nm(P.regs)} рег → ${nm(P.ftd)} FTD).

Потери складываются из:
• Не пробуют депозит — ушли после регистрации
• Платёж отклонён — decline ${pf(1-geoApprove)} (${pay.provider})

${g.name}: ${pay.issue}`}
          formula={`${nm(fRegs)} × (1 − ${p1(P.r2f)}) = ${nm(fLostR2F)} потеряно`}
          fix={`Онбординг + бонус на депозит + снизить decline. Approve ${g.name}: ${pf(geoApprove)} (платформа ${pf(P.approve)})`}/>

        {/* 2. FTD */}
        <FunnelStep icon="✅" needed={fFTD} current={cFTD} label="FTD — первый депозит прошёл" color="#3b82f6" pctOfTop={fFTD/fRegs}
          formula={`${nm(fRegs)} × ${p1(P.r2f)} = ${nm(fFTD)}`} tag="факт R2F"/>

        {/* Drop: M1 */}
        <DropOff lost={fLostM1} pctLost={1-P.m1} sev="y"
          title={`${pf(1-P.m1)} не вернулись через месяц`}
          detail={`M1 ретеншен ${p1(P.m1)}: из ${nm(fFTD)} новых FTD только ${nm(fM1)} будут активны в следующем месяце.

${nm(fLostM1)} уходят навсегда — это главная дыра.
Каждый +1% M1 экономит ~${nm(Math.round(rNow*0.01/P.m1))} регистраций.`}
          formula={`${nm(fFTD)} × ${pf(1-P.m1)} = ${nm(fLostM1)} потеряно`}
          fix="Бонус D1–D7, push день 1/3/7, персональный онбординг"/>

        {/* 3. M1 Active */}
        <FunnelStep icon="📅" needed={fM1} current={cM1} label="Активны через месяц (M1)" color="#06b6d4" pctOfTop={fM1/fRegs}
          formula={`${nm(fFTD)} × ${p1(P.m1)} = ${nm(fM1)}`}/>

        {/* 4. Steady state */}
        <Gain value={`×${MULT.toFixed(2)} множитель`}
          label={`когорты накапливаются (M2M ${p1(P.m2m)})`}
          detail={`Выжившие удерживаются ${p1(P.m2m)} каждый месяц. ${nm(fFTD)} FTD/мес → ${nm(fSteady)} active в steady-state (~${Math.ceil(Math.log(0.1)/Math.log(P.m2m))} мес).`}/>

        <FunnelStep icon="♻️" needed={fSteady} current={cSteady} label="Steady-state active" color="#22c55e" pctOfTop={fSteady/fRegs}
          formula={`${nm(fFTD)} × ${MULT.toFixed(2)} = ${nm(fSteady)}`}/>

        {/* ARPPU */}
        <div style={{padding:"6px 0 0 32px",fontSize:11,color:"#6b7280"}}>
          × ARPPU <span style={{fontFamily:F,fontWeight:600,color:g.arppu>=50?"#22c55e":"#eab308"}}>{$(g.arppu)}</span>
          <span style={{fontSize:9,color:"#3d4150",fontFamily:F,marginLeft:6}}>{nm(fSteady)} × {$(g.arppu)} = {$(fSteady*g.arppu)}</span>
        </div>

        <div style={{marginTop:8,padding:"10px 12px",background:"#e5a00d06",border:"1px solid #e5a00d15",borderRadius:8,display:"flex",alignItems:"center",gap:10}}>
          <span style={{fontSize:16}}>💰</span>
          <div><div style={{fontFamily:F,fontSize:18,fontWeight:700,color:"#e5a00d"}}>{$(target)} NGR/мес</div>
            <div style={{fontSize:9,color:"#4b5563"}}>сейчас {$(g.ngr)} · нужно ×{(target/Math.max(1,g.ngr)).toFixed(1)}</div></div>
        </div>

        {/* Model check */}
        <div style={{marginTop:8,padding:"6px 8px",background:"#1a1d2440",borderRadius:6,fontSize:9,color:"#4b5563"}}>
          <b style={{color:"#6b7280"}}>Проверка модели:</b> {nm(cFTD)} FTD × {MULT.toFixed(2)} = {nm(cSteady)} active × {$(g.arppu)} = {$(modelNGR)} модель
          vs {$(g.ngr)} факт {modelDiff>0?<span style={{color:"#22c55e"}}>(+{$(modelDiff)} — старые когорты добавляют)</span>:<span style={{color:"#eab308"}}>({$(modelDiff)})</span>}
        </div>
      </div>

      {/* NGR vs GGR */}
      {m&&(<div style={cd}>
        <div style={{fontSize:12,fontWeight:600,color:"#f3f4f6",marginBottom:8}}>NGR vs GGR</div>
        <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
          <div style={{flex:1,minWidth:130,background:"#e5a00d06",border:"1px solid #e5a00d15",borderRadius:7,padding:8}}>
            <div style={{fontSize:9,color:"#e5a00d"}}>NGR (D−W)</div>
            <div style={{fontFamily:F,fontSize:16,fontWeight:700,color:"#e5a00d"}}>{$(g.ngr)}</div>
            <div style={{fontSize:9,color:"#4b5563"}}>{$(g.dep)} − {$(g.wd)}</div>
          </div>
          <div style={{flex:1,minWidth:130,background:"#3b82f606",border:"1px solid #3b82f615",borderRadius:7,padding:8}}>
            <div style={{fontSize:9,color:"#3b82f6"}}>GGR</div>
            <div style={{fontFamily:F,fontSize:16,fontWeight:700,color:"#3b82f6"}}>{$(m.ggr)}</div>
            <div style={{fontSize:9,color:"#4b5563"}}>Sport {$(m.sportP)} + Casino {$(m.casinoP)}</div>
          </div>
        </div>
      </div>)}

      {/* 4 PATHS */}
      <div style={{...cd,background:"#0d0e14",border:"1px solid #e5a00d18"}}>
        <div style={{fontSize:13,fontWeight:600,color:"#f3f4f6",marginBottom:10}}>4 пути к {$(target)}</div>
        <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:8}}>
          <PathCard emoji="📢" title="Лить трафик" color="#e5a00d" regs={`${nm(rNow)} рег/мес`} sub={`ARPPU ${$(g.arppu)}`} gx={`×${gxNow.toFixed(1)}`}/>
          <PathCard emoji="💰" title="Растить ARPPU" color="#8b5cf6" regs={`${$(arppuNeed)} ARPPU`} sub={`Трафик ${nm(cr)}`} gx={`×${(arppuNeed/g.arppu).toFixed(1)} от ${$(g.arppu)}`}/>
        </div>
        <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:8}}>
          <PathCard emoji="🔄" title="Ретеншен" color="#06b6d4" regs={`${nm(pathC)} рег/мес`} sub={`M1→20% M2M→55%`} gx={`−${nm(rNow-pathC)} рег`} isBest={rNow-pathC>rNow-pathD}/>
          <PathCard emoji="💳" title="Платежи" color="#22c55e" regs={`${nm(pathD)} рег/мес`} sub={`Approve→82%`} gx={`−${nm(rNow-pathD)} рег`} isBest={rNow-pathD>rNow-pathC}/>
        </div>
        <div style={{background:"#22c55e06",border:"1px solid #22c55e18",borderRadius:8,padding:10,marginBottom:6}}>
          <div style={{fontSize:11,color:"#22c55e",fontWeight:600}}>🎯 Рет + Плат</div>
          <div style={{fontFamily:F,fontSize:16,fontWeight:700,color:"#22c55e"}}>{nm(pathE)} рег <span style={{fontSize:12,fontWeight:400}}>−{nm(rNow-pathE)} от базы</span></div>
        </div>
        <div style={{background:"#8b5cf608",border:"1px solid #8b5cf615",borderRadius:8,padding:10}}>
          <div style={{fontSize:11,color:"#8b5cf6",fontWeight:600}}>🚀 Всё + ARPPU ×1.5</div>
          <div style={{fontFamily:F,fontSize:16,fontWeight:700,color:"#8b5cf6"}}>{nm(pathF)} рег <span style={{fontSize:12,fontWeight:400}}>−{nm(rNow-pathF)} · ARPPU {$(g.arppu)}→{$(g.arppu*1.5)}</span></div>
        </div>
      </div>

      <div style={{fontSize:8,color:"#2a2d35",padding:"3px 8px"}}>NGR=D−W · ×{MULT.toFixed(2)} · R2F={p1(P.r2f)} · {pd.label} · MGM.io</div>
    </div>
  );
}


ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
