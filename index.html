function App(){

    const b=base[code]; if(!b)return null;
    const ex=getEx(code);
    if(period!=="mar"||(!ex.vip&&!ex.vipp&&!ex.vippp))return b;

  useEffect(()=>{requestAnimationFrame(()=>{if(view==="all"){window.scrollTo(0,scrollRef.current);}else{window.scrollTo(0,0);}});},[view]);

  const getP=(code)=>{
    const ov=modelP[code]||{};
    const pay=PAY_INFO[code]||{approve:.69};
    return{r2f:ov.r2f??P_DEF.r2f, m1:ov.m1??P_DEF.m1, m2m:ov.m2m??P_DEF.m2m, arppu:ov.arppu, approve:pay.approve};
  };
  const setMP=(code,key,val)=>setModelP(p=>({...p,[code]:{...(p[code]||{}), [key]:val}}));
  const resetMP=code=>setModelP(p=>{const n={...p};delete n[code];return n;});

  const baseGeos=period==="mar"?MARCH:Q1AVG;

    const regsNeeded=arppu<=0?99999:Math.ceil(t/arppu/mult/pp.r2f);
    const ftdNeeded=arppu>0?Math.ceil(t/arppu/mult):99999;
    const curR=Math.round(g.ftd/pp.r2f);
    return{arppu,mult,regsNeeded,ftdNeeded,curR,r2f:pp.r2f,m1:pp.m1,m2m:pp.m2m};
  }

        </div>

          <NgrBar current={totNGR} target={totTarget}/>

            <span>R2F <b style={{color:"#d1d5db"}}>{p1(P_DEF.r2f)}</b></span>
            <span>M1 <b style={{color:"#eab308"}}>{p1(P_DEF.m1)}</b></span>
            <span>M2M <b style={{color:"#eab308"}}>{p1(P_DEF.m2m)}</b></span>

        </div>
        <div onClick={()=>setShowImp(!showImp)} style={{background:showImp?"#22c55e08":"#12131a",border:`1px solid ${showImp?"#22c55e25":"#1e2028"}`,borderRadius:8,padding:"6px 12px",marginBottom:10,cursor:"pointer"}}>
          <span style={{fontSize:11,color:showImp?"#22c55e":"#6b7280"}}>{showImp?"✅ M1→20% M2M→55% Approve→82%":"Показать после улучшений →"}</span>
        </div>
        {rows.map(({code,g,t,c,rImp,ftdImp})=>{
          const d=showImp?rImp:c.regsNeeded,ftdD=showImp?ftdImp:c.ftdNeeded;
          const dGx=d/Math.max(1,c.curR),col=dGx<=1?"#22c55e":dGx<=3?"#a3e635":dGx<=6?"#eab308":dGx<=12?"#f97316":"#ef4444";
          const hasCustom=!!modelP[code];
          return(<div key={code} onClick={()=>openGeo(code)} style={{...cd,cursor:"pointer",padding:12}}
            onMouseEnter={e=>e.currentTarget.style.borderColor="#2a2d35"} onMouseLeave={e=>e.currentTarget.style.borderColor="#1a1d24"}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:5}}>
              <div style={{display:"flex",alignItems:"center",gap:5}}>
                <span style={{fontSize:16}}>{g.flag}</span><span style={{fontSize:13,fontWeight:600,color:"#f3f4f6"}}>{g.name}</span>
                {geoTargets[code]&&<span onClick={e=>{e.stopPropagation();setGeoTargets(p=>{const n={...p};delete n[code];return n;})}} style={{fontSize:7,color:"#e5a00d",background:"#e5a00d15",padding:"1px 5px",borderRadius:3,cursor:"pointer"}}>свой ✕</span>}
                {hasCustom&&<span style={{fontSize:7,color:"#06b6d4",background:"#06b6d412",padding:"1px 4px",borderRadius:3}}>модель</span>}
              </div>
              <span style={{fontFamily:F,fontSize:11,fontWeight:600,color:col,background:`${col}12`,padding:"1px 6px",borderRadius:4}}>×{dGx.toFixed(1)}</span>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr auto 1fr",gap:"4px 6px",marginBottom:4,alignItems:"center"}}>
              <div style={{background:"#1a1d24",borderRadius:5,padding:"3px 7px",textAlign:"center"}}>
                <div style={{fontSize:8,color:"#4b5563"}}>сейчас рег</div><div style={{fontFamily:F,fontSize:14,fontWeight:600,color:"#6b7280"}}>{nm(c.curR)}</div>
              </div>
              <span style={{color:"#2a2d35",fontSize:12,gridRow:"1/3"}}>→</span>
              <div style={{background:"#e5a00d08",border:"1px solid #e5a00d18",borderRadius:5,padding:"3px 7px",textAlign:"center"}}>
                <div style={{fontSize:8,color:"#e5a00d"}}>нужно рег</div><div style={{fontFamily:F,fontSize:15,fontWeight:700,color:"#e5a00d"}}>{nm(d)}</div>
              </div>
              <div style={{background:"#1a1d24",borderRadius:5,padding:"3px 7px",textAlign:"center"}}>
                <div style={{fontSize:8,color:"#4b5563"}}>сейчас FTD</div><div style={{fontFamily:F,fontSize:13,fontWeight:600,color:"#6b7280"}}>{nm(g.ftd)}</div>
              </div>
              <div style={{background:"#3b82f608",border:"1px solid #3b82f618",borderRadius:5,padding:"3px 7px",textAlign:"center"}}>
                <div style={{fontSize:8,color:"#3b82f6"}}>нужно FTD</div><div style={{fontFamily:F,fontSize:13,fontWeight:600,color:"#3b82f6"}}>{nm(ftdD)}</div>
              </div>
            </div>
            {showImp&&c.regsNeeded-rImp>0&&<div style={{fontSize:10,color:"#22c55e",marginBottom:3}}>↓{nm(c.regsNeeded-rImp)} после улучшений</div>}
            <NgrBar current={g.ngr} target={t}/>
            <div style={{display:"flex",justifyContent:"space-between",marginTop:5,fontSize:10,gap:4,flexWrap:"wrap"}}>
              <span style={{color:"#4b5563"}}>ARPPU <span style={{fontFamily:F,fontWeight:600,color:c.arppu>=50?"#22c55e":c.arppu>=20?"#eab308":"#ef4444"}}>{$(c.arppu)}</span></span>
              <span style={{color:"#4b5563"}}>CO <span style={{fontFamily:F,fontWeight:600,color:g.cashout>.85?"#ef4444":g.cashout>.75?"#eab308":"#22c55e"}}>{pf(g.cashout)}</span></span>
              <span style={{color:"#4b5563"}}>AU <span style={{fontFamily:F,color:"#d1d5db"}}>{nm(g.au)}</span></span>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:6,marginTop:6,padding:"5px 0 2px",borderTop:"1px solid #1a1d24"}}>
              <span style={{fontSize:10,color:"#6b7280",whiteSpace:"nowrap"}}>Цель:</span>
              <TargetChips value={t} onChange={v=>setGeoTarget(code,v)} size="big"/>
              <div style={{marginLeft:"auto",display:"flex",gap:2}}>{[["vippp","++"],["vipp","+"],["vip","В"]].map(([seg,lb])=>{const on=getEx(code)[seg];return(<button key={seg} onClick={e=>toggleSeg(code,seg,e)} style={{background:on?"#dc2626":"#12131a",border:`1px solid ${on?"#dc2626":"#1e2028"}`,borderRadius:4,padding:"2px 5px",cursor:"pointer",fontFamily:F,color:on?"#fff":"#4b5563",fontSize:9,fontWeight:600,transition:"all .1s",minWidth:22}}>{lb}</button>);})}</div>
            </div>
          </div>);
        })}
      </div>
    );
  }

  // ━━ GEO DETAIL ━━
  const g=getGeoData(view); if(!g){goBack();return null;}
  const target=getTarget(view),m=g;
  const pay=PAY_INFO[view]||{approve:.69,provider:"—",issue:"Нет данных"};
  const pp=getP(view);
  const arppu=pp.arppu??g.arppu;
  const r2f=pp.r2f, m1=pp.m1, m2m=pp.m2m;
  const mult=1+m1/(1-m2m);
  const curR=Math.round(g.ftd/r2f);
  const regsNeeded=arppu<=0?99999:Math.ceil(target/arppu/mult/r2f);
  const ftdNeeded=arppu>0?Math.ceil(target/arppu/mult):0;
  const activeNeeded=arppu>0?Math.round(target/arppu):0;
  const hasOverrides=!!modelP[view];

  const fRegs=regsNeeded, fFTD=ftdNeeded;
  const fLostR2F=fRegs-fFTD;
  const fM1=Math.round(fFTD*m1);
  const fLostM1=fFTD-fM1;

  return(
    <div style={{minHeight:"100vh",background:"#08090d",color:"#c8ccd4",fontFamily:Sans,padding:"12px 8px"}}>
      {/* Header */}
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
        <button onClick={goBack} style={{background:"#12131a",border:"1px solid #1e2028",borderRadius:7,padding:"5px 11px",color:"#6b7280",fontSize:13,cursor:"pointer"}}>←</button>
        <div style={{flex:1}}><div style={{fontSize:17,fontWeight:700,color:"#f3f4f6"}}>{g.flag} {g.name}</div><div style={{fontSize:10,color:hasAnyEx(view)?"#dc2626":"#6b7280"}}>{pdLabel} · {hasAnyEx(view)?"Без "+[getEx(view).vippp&&"++",getEx(view).vipp&&"+",getEx(view).vip&&"В"].filter(Boolean).join("/"):"Факт"}</div></div>
      </div>

      {/* 1. TARGET */}
      <div style={{...cd,padding:10,display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
        <span style={{fontSize:11,color:"#6b7280"}}>NGR цель:</span>
        {TARGETS.map(v=>(<button key={v} onClick={()=>setGeoTarget(view,v)} style={{background:target===v?"#e5a00d":"#12131a",border:`1px solid ${target===v?"#e5a00d":"#1e2028"}`,borderRadius:6,padding:"4px 10px",cursor:"pointer",fontFamily:F,color:target===v?"#08090d":"#6b7280",fontSize:11,fontWeight:700}}>{$(v)}</button>))}
        <div style={{marginLeft:"auto",display:"flex",gap:3}}>{[["vippp","VIP++"],["vipp","VIP+"],["vip","VIP"]].map(([seg,lb])=>{const on=getEx(view)[seg];return(<button key={seg} onClick={()=>toggleSeg(view,seg)} style={{background:on?"#dc2626":"#12131a",border:`1px solid ${on?"#dc2626":"#1e2028"}`,borderRadius:5,padding:"4px 8px",cursor:"pointer",fontFamily:F,color:on?"#fff":"#6b7280",fontSize:10,fontWeight:600,transition:"all .1s"}}>{on?"−":""}{lb}</button>);})}</div>
      </div>

      {/* 2. ANSWER — what marketing needs to deliver */}
      <div style={{background:"linear-gradient(135deg,#16130a,#0f1015)",border:"1px solid #e5a00d25",borderRadius:12,padding:16,marginBottom:10}}>
        <div style={{fontSize:9,color:"#6b7280",textTransform:"uppercase",letterSpacing:1,marginBottom:8,textAlign:"center"}}>Задание для маркетинга</div>
        <div style={{display:"flex",justifyContent:"center",gap:16,flexWrap:"wrap"}}>
          <div style={{textAlign:"center"}}>
            <div style={{fontSize:9,color:"#e5a00d"}}>нужно рег/мес</div>
            <div style={{fontFamily:F,fontSize:28,fontWeight:700,color:"#e5a00d"}}>{nm(regsNeeded)}</div>
            <div style={{fontSize:10,color:"#4b5563"}}>сейчас {nm(curR)} · +{nm(Math.max(0,regsNeeded-curR))}</div>
          </div>
          <div style={{width:1,background:"#1e2028",margin:"4px 0"}}/>
          <div style={{textAlign:"center"}}>
            <div style={{fontSize:9,color:"#3b82f6"}}>нужно FTD/мес</div>
            <div style={{fontFamily:F,fontSize:28,fontWeight:700,color:"#3b82f6"}}>{nm(ftdNeeded)}</div>
            <div style={{fontSize:10,color:"#4b5563"}}>сейчас {nm(g.ftd)} · +{nm(Math.max(0,ftdNeeded-g.ftd))}</div>
          </div>
        </div>
        <div style={{textAlign:"center",marginTop:8,fontSize:10,color:"#4b5563"}}>
          При ARPPU {$(arppu)} · R2F {p1(r2f)} · ×{mult.toFixed(2)}
        </div>
      </div>

      {/* 3. CURRENT FACT — compact, with NGR bar */}
      <div style={cd}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
          <span style={{fontSize:12,fontWeight:600,color:"#f3f4f6"}}>Текущие показатели</span>
          <span style={{fontSize:9,color:"#4b5563"}}>{pdLabel}</span>
        </div>
        <NgrBar current={g.ngr} target={target}/>
        <div style={{display:"flex",flexWrap:"wrap",gap:"6px 12px",marginTop:8}}>
          {[
            ["NGR",$(g.ngr),g.ngr>0?"#22c55e":"#ef4444"],
            ["Dep",$(g.dep)],["WD",$(g.wd)],
            ["CO",pf(g.cashout),g.cashout>.85?"#ef4444":"#d1d5db"],
            ["AU",nm(g.au)],["FTD",nm(g.ftd)],
            ["ARPPU",$(g.arppu),g.arppu>=50?"#22c55e":g.arppu>=20?"#eab308":"#ef4444"],
          ].map(([l,v,c])=>(<div key={l}><span style={{fontSize:8,color:"#4b5563",textTransform:"uppercase"}}>{l} </span><span style={{fontFamily:F,fontSize:11,fontWeight:600,color:c||"#d1d5db"}}>{v}</span></div>))}
        </div>
        {m&&<div style={{display:"flex",gap:12,marginTop:6,paddingTop:6,borderTop:"1px solid #1a1d24"}}>
          <Tip text={`GGR = Sport (${$(m.sportP)}) + Casino (${$(m.casinoP)})\nNGR = Deposits − Withdrawals\n\nGGR > NGR типично: GGR считает маржу до выплат, NGR — чистый денежный поток.`}>
            <span style={{fontSize:9,color:"#4b5563"}}>GGR <span style={{fontFamily:F,color:"#6b7280"}}>{$(m.ggr)}</span></span>
          </Tip>
          <span style={{fontSize:9,color:"#4b5563"}}>LTV <span style={{fontFamily:F,color:"#6b7280"}}>{$(m.ltv)}</span></span>
          <span style={{fontSize:9,color:"#4b5563"}}>PB <span style={{fontFamily:F,color:"#6b7280"}}>{m.payback}мес</span></span>
        </div>}
      </div>

      {/* 4. MODEL PARAMETERS — editable */}
      <div style={{...cd,paddingBottom:10}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
          <span style={{fontSize:12,fontWeight:600,color:"#f3f4f6"}}>Параметры модели</span>
          {hasOverrides&&<button onClick={()=>resetMP(view)} style={{fontSize:9,color:"#6b7280",background:"#1a1d24",border:"1px solid #1e2028",borderRadius:4,padding:"2px 8px",cursor:"pointer"}}>Сброс</button>}
        </div>
        <Slider label="ARPPU" value={arppu} onChange={v=>setMP(view,"arppu",v)} min={1} max={500} step={1} fmt={v=>`$${v}`}
          tip={`Средний доход с платящего юзера в месяц.\nФакт ${g.name}: ${$(g.arppu)}`}/>
        <Slider label="R2F" value={Math.round(r2f*1000)/10} onChange={v=>setMP(view,"r2f",v/100)} min={1} max={50} step={0.5} fmt={v=>`${v}%`}
          tip={`Конверсия Reg→FTD. Какой % зарегистрированных делает первый депозит.\nПлатформа: ${p1(P_DEF.r2f)}`}/>
        <Slider label="M1 ret" value={Math.round(m1*1000)/10} onChange={v=>setMP(view,"m1",v/100)} min={1} max={50} step={0.5} fmt={v=>`${v}%`}
          tip={`Ретеншен 1-го месяца. Какой % FTD вернётся через месяц.\nПлатформа: ${p1(P_DEF.m1)}`}/>
        <Slider label="M2M ret" value={Math.round(m2m*1000)/10} onChange={v=>setMP(view,"m2m",v/100)} min={10} max={80} step={1} fmt={v=>`${v}%`}
          tip={`Ретеншен месяц-к-месяцу. Какой % выживших остаётся каждый месяц.\nПлатформа: ${p1(P_DEF.m2m)}`}/>
        <div style={{fontSize:9,color:"#4b5563",marginTop:4,padding:"0 2px"}}>
          Множитель ×{mult.toFixed(2)} = 1 + M1/(1−M2M) · Steady-state active = FTD × {mult.toFixed(2)}
        </div>
      </div>

      {/* 5. FUNNEL — clean visual */}
      <div style={{...cd,paddingBottom:14}}>
        <div style={{fontSize:12,fontWeight:600,color:"#f3f4f6",marginBottom:8}}>Воронка до {$(target)} NGR</div>

        <FunnelBar width={100} needed={fRegs} current={curR} label="Регистрации / мес" color="#e5a00d"/>

        <FunnelLoss lost={fLostR2F} pct={1-r2f} color="#ef4444" label={`не делают FTD (R2F ${p1(r2f)})`}
          tip={`Из ${nm(fRegs)} зарегистрированных только ${p1(r2f)} делает первый депозит.\n\nПотери: не пробуют депозит + decline платежей.\n\n${g.name}: Approve ${pf(pay.approve)} (${pay.provider})\n${pay.issue}`}/>

        <FunnelBar width={r2f*100} needed={fFTD} current={g.ftd} label="FTD — первый депозит" color="#3b82f6"
          formula={`${nm(fRegs)} × ${p1(r2f)}`}/>

        <FunnelLoss lost={fLostM1} pct={1-m1} color="#eab308" label={`не вернулись (M1 ${p1(m1)})`}
          tip={`Из ${nm(fFTD)} новых FTD только ${p1(m1)} вернутся через месяц.\n\n${nm(fLostM1)} уходят навсегда.\nКаждый +1% M1 экономит ~${nm(Math.round(regsNeeded*0.01/m1))} рег.`}/>

        <FunnelBar width={r2f*m1*100} needed={fM1} label="Активны через месяц (M1)" color="#06b6d4"
          formula={`${nm(fFTD)} × ${p1(m1)}`}/>

        <div style={{padding:"4px 12px",margin:"4px 0",fontSize:10,color:"#22c55e"}}>
          ↕ когорты накапливаются ×{mult.toFixed(2)} <span style={{color:"#4b5563"}}>(M2M {p1(m2m)})</span>
        </div>

        <FunnelBar width={Math.min(100,activeNeeded/fRegs*100)} needed={activeNeeded} label="Steady-state active" color="#22c55e"
          formula={`${$(target)} / ${$(arppu)}`}/>

        <div style={{marginTop:8,padding:"10px 12px",background:"#e5a00d08",border:"1px solid #e5a00d18",borderRadius:8,display:"flex",alignItems:"center",gap:10}}>
          <span style={{fontSize:16}}>💰</span>
          <div>
            <div style={{fontFamily:F,fontSize:16,fontWeight:700,color:"#e5a00d"}}>{nm(activeNeeded)} active × {$(arppu)} = {$(target)}</div>
            <div style={{fontSize:9,color:"#4b5563"}}>NGR/мес{g.ngr>0?` · сейчас ${$(g.ngr)} (${pf(g.ngr/target)})`:""}</div>
          </div>
        </div>
      </div>

      {/* 6. SCENARIOS — what-if */}
      <div style={{...cd,background:"#0d0e14",border:"1px solid #e5a00d18"}}>
        <div style={{fontSize:12,fontWeight:600,color:"#f3f4f6",marginBottom:8}}>Сценарии</div>
        <div style={{fontSize:9,color:"#4b5563",marginBottom:8}}>Сколько рег/мес при разных улучшениях (цель {$(target)})</div>
        {(()=>{
          const base=regsNeeded;
          const arppuUp=arppu<=0?99999:Math.ceil(target/(arppu*1.5)/(1+m1/(1-m2m))/r2f);
          const retUp=arppu<=0?99999:Math.ceil(target/arppu/(1+.20/(1-.55))/r2f);
          const payUp=arppu<=0?99999:Math.ceil(target/arppu/mult/(r2f*(.82/pay.approve)));
          const allUp=arppu<=0?99999:Math.ceil(target/(arppu*1.5)/(1+.20/(1-.55))/(r2f*(.82/pay.approve)));
          const items=[
            {label:"Текущие",regs:base,color:"#6b7280",sub:`ARPPU ${$(arppu)}, M1 ${p1(m1)}, Approve ${pf(pay.approve)}`},
            {label:"ARPPU ×1.5",regs:arppuUp,color:"#8b5cf6",sub:`${$(arppu)} → ${$(arppu*1.5)}`},
            {label:"Ретеншен +",regs:retUp,color:"#06b6d4",sub:"M1→20%, M2M→55%"},
            {label:"Платежи +",regs:payUp,color:"#22c55e",sub:`Approve→82% (сейчас ${pf(pay.approve)})`},
            {label:"Всё вместе",regs:allUp,color:"#e5a00d",sub:"ARPPU×1.5 + рет + платежи"},
          ];
          return items.map(({label,regs,color,sub})=>{
            const saved=base-regs,pct=Math.max(5,Math.min(regs/base*100,100));
            return(<div key={label} style={{marginBottom:6}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:2}}>
                <span style={{fontSize:10,color,fontWeight:600}}>{label}</span>
                <span style={{fontFamily:F,fontSize:12,fontWeight:700,color}}>{nm(regs)} рег</span>
              </div>
              <div style={{height:4,background:"#1a1d24",borderRadius:2,overflow:"hidden",marginBottom:2}}>
                <div style={{height:"100%",width:`${pct}%`,background:color,borderRadius:2}}/>
              </div>
              <div style={{display:"flex",justifyContent:"space-between",fontSize:9,color:"#4b5563"}}>
                <span>{sub}</span>
                {saved>0&&<span style={{color}}>−{nm(saved)} рег</span>}
              </div>
            </div>);
          });
        })()}
      </div>

      {/* 7. PAYMENTS NOTE */}
      <div style={{...cd,padding:10}}>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          <span style={{fontSize:13}}>💳</span>
          <div>
            <div style={{fontSize:11,fontWeight:600,color:"#f3f4f6"}}>{pay.provider} · Approve {pf(pay.approve)}</div>
            <div style={{fontSize:10,color:"#6b7280"}}>{pay.issue}</div>
          </div>
        </div>
      </div>

      <div style={{fontSize:8,color:"#2a2d35",padding:"3px 8px"}}>NGR = Dep − WD · ×{mult.toFixed(2)} · R2F {p1(r2f)} · {pdLabel}</div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
